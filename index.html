<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Zentrix API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --accent-green: #00c853;
            --text-muted: #a0a0a0;
        }
        html, body { width: 100%; overflow-x: hidden; }
        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            margin: 0;
            padding: 0;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .accent-text { color: var(--accent-green); }
        .accent-bg { background-color: var(--accent-green); }
        .card { background-color: var(--card-bg); border: 1px solid #222; }
        [x-cloak] { display: none !important; }
        
        main { width: 100%; padding-bottom: 40px; }
        
        /* Top navbar - Clean */
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 40;
            background-color: var(--card-bg);
            border-bottom: 1px solid #222;
            padding: 0 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        
        /* Sidebar / Drawer */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 300px;
            z-index: 70;
            background-color: var(--card-bg);
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            box-shadow: 20px 0 50px rgba(0,0,0,0.5);
        }
        
        .sidebar-header {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid #222;
        }
        
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            z-index: 60;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            transition: opacity 0.3s;
        }

        /* Buttons & Inputs - Large touch targets */
        .btn-large {
            min-height: 52px;
            width: 100%;
            border-radius: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }
        
        .input-large {
            min-height: 52px;
            width: 100%;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 0.75rem;
            padding: 0 1rem;
            color: #fff;
            font-size: 1rem;
        }

        /* Stats grid 2x2 */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        section { padding: 1.5rem 1rem; }
        #home { padding-top: 100px; }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.875rem 1.5rem;
            color: #999;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            border-radius: 0.5rem;
            margin: 0.25rem 0.75rem;
        }
        .nav-link.active {
            background-color: rgba(0, 200, 83, 0.1);
            color: var(--accent-green);
        }
    </style>
</head>
<body x-data="zentrixApp()">

    <!-- Top Navbar -->
    <div class="top-nav">
        <div style="display: flex; align-items: center; gap: 1rem;">
            <button @click="sidebarOpen = true" class="p-2 -ml-2 active:opacity-60">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <div style="font-weight: 800; font-size: 1.25rem;">Zentrix <span class="accent-text">API</span></div>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <div style="width: 8px; height: 8px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 10px var(--accent-green);"></div>
            <span class="mono" style="font-size: 0.7rem; color: #666; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px;">v1.0.0</span>
        </div>
    </div>

    <!-- Sidebar Overlay -->
    <div x-show="sidebarOpen" x-cloak class="sidebar-overlay" @click="sidebarOpen = false" x-transition:enter="transition opacity-0 duration-300" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"></div>

    <!-- Sidebar Drawer -->
    <div :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'" class="sidebar transition-transform duration-300 ease-in-out">
        <div class="sidebar-header">
            <div style="font-weight: 900; font-size: 1.5rem; margin-bottom: 0.25rem;">Zentrix <span class="accent-text">API</span></div>
            <div style="font-size: 0.75rem; color: #666; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">Free API Service</div>
        </div>
        
        <nav style="flex: 1; padding: 1rem 0; overflow-y: auto;">
            <template x-for="item in menuItems" :key="item.id">
                <a :href="item.link" 
                   @click="sidebarOpen = false; currentPage = item.page; if(item.link.startsWith('#')) { scrollTo(item.link); }" 
                   class="nav-link" 
                   :class="currentPage === item.page ? 'active' : ''">
                    <span x-html="item.icon"></span>
                    <span x-text="item.label"></span>
                </a>
            </template>
        </nav>

        <div style="padding: 1.5rem; border-top: 1px solid #222;">
            <a href="https://twitter.com/Zentrix" target="_blank" class="flex items-center gap-2 text-sm text-gray-500 no-underline hover:text-white">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.84 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417a9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
                Follow Us @Zentrix
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <main>
        <!-- Home -->
        <section id="home" x-show="currentPage === 'home'">
            <h1 style="font-size: 2.25rem; font-weight: 900; line-height: 1.1; margin-bottom: 1rem;">Empower Your Apps with <span class="accent-text">Zentrix Intelligence</span></h1>
            <p style="color: #888; line-height: 1.6; margin-bottom: 2rem;">A lightning-fast, developer-first API suite for media downloading and data processing.</p>
            
            <div style="display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2.5rem;">
                <button @click="currentPage = 'endpoints'; scrollTo('#endpoints')" class="btn-large accent-bg" style="color: #000;">Get Started</button>
                <button @click="currentPage = 'install'; scrollTo('#install')" class="btn-large" style="background: #1a1a1a; border: 1px solid #333;">Setup Guide</button>
            </div>

            <div class="stats-grid">
                <template x-for="(val, key) in stats" :key="key">
                    <div class="card" style="padding: 1.25rem; border-radius: 1rem; text-align: center;">
                        <div class="accent-text" style="font-size: 1.5rem; font-weight: 900;" x-text="val"></div>
                        <div style="font-size: 0.6rem; color: #555; text-transform: uppercase; font-weight: 700; margin-top: 0.25rem;" x-text="key"></div>
                    </div>
                </template>
            </div>
        </section>

        <!-- Endpoints -->
        <section id="endpoints" x-show="currentPage === 'endpoints'">
            <h2 style="font-size: 1.75rem; font-weight: 800; margin-bottom: 1.5rem;"><span class="accent-bg" style="width: 4px; height: 1.75rem; display: inline-block; vertical-align: middle; margin-right: 0.75rem; border-radius: 2px;"></span>Endpoints</h2>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <template x-for="cat in categories" :key="cat.id">
                    <div class="card" @click="selectedCategory = cat.id" style="padding: 1.25rem; border-radius: 1rem; cursor: pointer;">
                        <div style="width: 3rem; height: 3rem; background: #1a1a1a; border-radius: 0.75rem; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem;" x-html="cat.icon"></div>
                        <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;" x-text="cat.name"></h3>
                        <p style="font-size: 0.9rem; color: #777; line-height: 1.5;" x-text="cat.description"></p>
                    </div>
                </template>
            </div>

            <div style="margin-top: 2rem;" x-show="selectedCategory">
                <template x-for="ep in filteredEndpoints" :key="ep.path">
                    <div class="card" style="border-radius: 1rem; overflow: hidden; margin-bottom: 1rem;">
                        <div @click="ep.expanded = !ep.expanded" style="padding: 1.25rem; display: flex; align-items: center; justify-content: space-between;">
                            <div style="display: flex; align-items: center; gap: 0.75rem;">
                                <span style="background: rgba(0,200,83,0.15); color: var(--accent-green); font-size: 0.7rem; font-weight: 800; padding: 4px 8px; border-radius: 4px;">GET</span>
                                <span class="mono" style="font-size: 0.9rem; font-weight: 600;" x-text="ep.path"></span>
                            </div>
                            <svg :class="ep.expanded ? 'rotate-180' : ''" class="w-5 h-5 text-gray-600 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                        </div>
                        <div x-show="ep.expanded" x-collapse style="padding: 1.25rem; background: #0c0c0c; border-top: 1px solid #222;">
                            <div style="font-size: 0.7rem; color: #555; font-weight: 800; text-transform: uppercase; margin-bottom: 1rem;">Parameters</div>
                            <template x-for="p in ep.params" :key="p.name">
                                <div style="margin-bottom: 1rem;">
                                    <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 0.5rem;">
                                        <span class="mono" style="font-weight: 700;">{{p.name}}<span x-show="p.required" style="color: #ff4d4d;">*</span></span>
                                        <span style="color: #555; text-transform: uppercase;">{{p.type}}</span>
                                    </div>
                                    <input type="text" x-model="ep.testParams[p.name]" :placeholder="p.description" class="input-large">
                                </div>
                            </template>
                            <button @click="executeEndpoint(ep)" class="btn-large accent-bg" style="color: #000; margin-top: 0.5rem;" :disabled="ep.executing">
                                <span x-show="!ep.executing">Execute</span>
                                <span x-show="ep.executing">Executing...</span>
                            </button>
                            
                            <div style="margin-top: 1.5rem;">
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem;">
                                    <span style="font-size: 0.7rem; color: #555; font-weight: 800; text-transform: uppercase;">Response</span>
                                    <button @click="copyJson(ep.lastResponse || ep.mockResponse)" style="font-size: 0.7rem; color: var(--accent-green); background: none; border: none; font-weight: 700;">COPY JSON</button>
                                </div>
                                <div style="background: #050505; padding: 1rem; border-radius: 0.75rem; border: 1px solid #222; overflow-y: auto; max-height: 250px;">
                                    <pre class="mono" style="font-size: 0.75rem; color: #888;"><code x-text="JSON.stringify(ep.lastResponse || ep.mockResponse, null, 2)"></code></pre>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- Pricing -->
        <section id="pricing" x-show="currentPage === 'pricing'">
            <h2 style="font-size: 1.75rem; font-weight: 800; margin-bottom: 1.5rem;"><span class="accent-bg" style="width: 4px; height: 1.75rem; display: inline-block; vertical-align: middle; margin-right: 0.75rem; border-radius: 2px;"></span>Pricing</h2>
            <div style="display: flex; flex-direction: column; gap: 1rem;">
                <template x-for="plan in pricingPlans" :key="plan.name">
                    <div class="card" style="padding: 1.5rem; border-radius: 1.25rem; position: relative;" :style="plan.popular ? 'border-color: var(--accent-green);' : ''">
                        <div x-show="plan.popular" style="position: absolute; top: 0; right: 0; background: var(--accent-green); color: #000; font-size: 0.6rem; font-weight: 900; padding: 4px 12px; border-radius: 0 1.25rem 0 0.75rem;">POPULAR</div>
                        <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem;" x-text="plan.name"></h3>
                        <div style="display: flex; align-items: baseline; gap: 0.25rem; margin-bottom: 1.5rem;">
                            <span style="font-size: 2rem; font-weight: 900; color: var(--accent-green);" x-text="plan.price"></span>
                            <span style="color: #555; font-size: 0.9rem;">/month</span>
                        </div>
                        <ul style="list-style: none; padding: 0; margin: 0 0 1.5rem 0; display: flex; flex-direction: column; gap: 0.75rem;">
                            <template x-for="f in plan.features" :key="f">
                                <li style="display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem; color: #888;">
                                    <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
                                    <span x-text="f"></span>
                                </li>
                            </template>
                        </ul>
                        <button class="btn-large" :style="plan.popular ? 'background: var(--accent-green); color: #000;' : 'background: #1a1a1a; border: 1px solid #333; color: #fff;'">Choose Plan</button>
                    </div>
                </template>
            </div>
        </section>

        <!-- Install -->
        <section id="install" x-show="currentPage === 'install'">
            <h2 style="font-size: 1.75rem; font-weight: 800; margin-bottom: 1.5rem;"><span class="accent-bg" style="width: 4px; height: 1.75rem; display: inline-block; vertical-align: middle; margin-right: 0.75rem; border-radius: 2px;"></span>Setup Guide</h2>
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <template x-for="(step, index) in installSteps" :key="index">
                    <div>
                        <div style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem;">
                            <div style="width: 1.5rem; height: 1.5rem; border-radius: 50%; background: var(--accent-green); color: #000; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 900;" x-text="index + 1"></div>
                            <h3 style="font-weight: 700;" x-text="step.title"></h3>
                        </div>
                        <p style="font-size: 0.9rem; color: #777; margin-bottom: 0.75rem; padding-left: 2.25rem;" x-text="step.description"></p>
                        <div style="margin-left: 2.25rem; background: #050505; padding: 1rem; border-radius: 0.75rem; border: 1px solid #222; position: relative;">
                            <pre class="mono" style="font-size: 0.75rem; color: #00c853; overflow-x: auto;"><code x-text="step.code"></code></pre>
                            <button @click="copyText(step.code)" style="position: absolute; top: 0.5rem; right: 0.5rem; background: none; border: none; color: #444;">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"/></svg>
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </section>

        <!-- FAQ -->
        <section id="faq" x-show="currentPage === 'faq'">
            <h2 style="font-size: 1.75rem; font-weight: 800; margin-bottom: 1.5rem;"><span class="accent-bg" style="width: 4px; height: 1.75rem; display: inline-block; vertical-align: middle; margin-right: 0.75rem; border-radius: 2px;"></span>FAQ</h2>
            <template x-for="f in faqs" :key="f.question">
                <div class="card" style="margin-bottom: 0.75rem; border-radius: 0.75rem;">
                    <button @click="f.open = !f.open" style="width: 100%; padding: 1.25rem; background: none; border: none; text-align: left; display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 600; color: #fff;" x-text="f.question"></span>
                        <svg :class="f.open ? 'rotate-180' : ''" class="w-5 h-5 text-gray-600 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"/></svg>
                    </button>
                    <div x-show="f.open" x-collapse style="padding: 0 1.25rem 1.25rem 1.25rem; color: #777; font-size: 0.95rem; line-height: 1.6;" x-text="f.answer"></div>
                </div>
            </template>
        </section>
    </main>

    <!-- Toast -->
    <div x-show="toast.show" x-cloak x-transition class="card" style="position: fixed; bottom: 2rem; left: 1rem; right: 1rem; background: #fff; color: #000; padding: 1rem; border-radius: 1rem; z-index: 100; font-weight: 700; display: flex; align-items: center; gap: 0.75rem;">
        <svg class="w-6 h-6 text-green-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
        <span x-text="toast.message"></span>
    </div>

    <script>
        function zentrixApp() {
            return {
                sidebarOpen: false,
                currentPage: 'home',
                selectedCategory: 'downloader',
                toast: { show: false, message: '' },
                stats: { endpoint: '1', category: '1', price: 'FREE', response: 'JSON' },
                baseUrl: 'https://3000-iredgx08y8ys857x2t6pg-e98f5ff5.us2.manus.computer',
                categories: [{ id: 'downloader', name: 'Downloader', description: 'High-speed media extraction from YouTube, Instagram, etc.', icon: `<svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>` }],
                endpoints: [{ 
                    categoryId: 'downloader', 
                    path: '/downloader/yta', 
                    description: 'Extract YouTube audio.', 
                    expanded: false, 
                    executing: false, 
                    params: [
                        { name: 'q', type: 'string', required: true, description: 'Song name or artist' }, 
                        { name: 'quality', type: 'string', required: false, description: '128k, 192k, 320k' }
                    ], 
                    testParams: { q: 'Alan Walker Faded', quality: '128k' }, 
                    lastResponse: null,
                    mockResponse: { 
                        status: 200, 
                        powered_by: "Zentrix Tech",
                        result: { 
                            title: "Rick Astley - Never Gonna Give You Up", 
                            duration: "03:32", 
                            size: "3.24 MB",
                            dl_url: "https://zentrix-cdn.com/dl/yta/7283912.mp3",
                            thumbnail: "https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg"
                        } 
                    } 
                }],
                menuItems: [
                    { id: 'h', label: 'Home', link: '#home', page: 'home', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>' },
                    { id: 'e', label: 'Endpoints', link: '#endpoints', page: 'endpoints', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>' },
                    { id: 'c', label: 'Categories', link: '#endpoints', page: 'endpoints', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>' },
                    { id: 'p', label: 'Pricing', link: '#pricing', page: 'pricing', icon: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>' },
